<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>Claude Code Explorer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><g fill='none' stroke='%234ec9b0' stroke-width='11' stroke-linecap='round'><circle cx='42' cy='42' r='27'/><line x1='62' y1='62' x2='88' y2='88'/></g></svg>">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <h1><svg class="logo" viewBox="0 0 100 100" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-width="11" stroke-linecap="round"><circle cx="42" cy="42" r="27"/><line x1="62" y1="62" x2="88" y2="88"/></g></svg>Claude Code Explorer</h1>
  <div id="view-toggle">
    <button id="tab-usage">Usage</button>
    <button id="tab-plan">Plan &amp; tier</button>
    <button id="tab-files" class="active">Files</button>
  </div>
  <div id="subbar">
    <div id="category-selector">
      <span id="highlight-label">Highlight</span>
      <div id="highlight" title="Highlight a category"></div>
    </div>
    <div id="breadcrumb"></div>
  </div>
</header>
<main>
  <div id="list"></div>
  <div id="divider"></div>
  <div id="content">
    <div id="filehead"></div>
    <div id="filebody"><div class="placeholder">Select a file to view its contents.</div></div>
  </div>
  <div id="usage"><div class="placeholder">Loading usage…</div></div>
</main>
<div id="u-tip"></div>
<script src="app.js" defer></script>
</body>
</html>
