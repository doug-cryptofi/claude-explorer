<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Explorer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><g fill='none' stroke='%234ec9b0' stroke-width='11' stroke-linecap='round'><circle cx='42' cy='42' r='27'/><line x1='62' y1='62' x2='88' y2='88'/></g></svg>">
<style>
  :root {
    --bg: #1e1e1e; --panel: #252526; --border: #333; --fg: #d4d4d4;
    --muted: #858585; --accent: #4ec9b0; --dir: #569cd6; --hover: #2a2d2e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--bg); color: var(--fg); height: 100vh; display: flex; flex-direction: column;
    font-size: 14px;
  }
  header {
    padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 15px; margin: 0; color: var(--accent); font-weight: 600; }
  #breadcrumb { color: var(--muted); overflow-x: auto; white-space: nowrap; flex: 1; }
  #breadcrumb a { color: var(--dir); text-decoration: none; cursor: pointer; }
  #breadcrumb a:hover { text-decoration: underline; }
  #breadcrumb span.sep { color: var(--muted); margin: 0 4px; }
  main { flex: 1; display: flex; overflow: hidden; }
  #list {
    width: 340px; flex: 0 0 auto; overflow-y: auto; background: var(--panel);
  }
  #divider {
    flex: 0 0 5px; cursor: col-resize; background: var(--border);
    transition: background .15s;
  }
  #divider:hover, #divider.dragging { background: var(--accent); }
  .row {
    display: flex; align-items: center; gap: 8px; padding: 2px 12px; cursor: pointer;
    white-space: nowrap; min-height: 1.9rem; flex: 0 0 auto;
  }
  .row .cat-badge, .row .icon { line-height: 1; }
  .row:hover { background: var(--hover); }
  .row.sel { background: #37373d; }
  .row .icon { width: 16px; text-align: center; }
  .row .name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .row.dir .name { color: var(--dir); }
  .row .meta { color: var(--muted); font-size: 12px; }
  .row.hl { background: color-mix(in srgb, var(--hl) 16%, transparent); box-shadow: inset 3px 0 0 var(--hl); }
  .row.hl .name { color: var(--hl); }
  .row .cat-badge { font-size: 12px; margin-left: 5px; }
  .row.dim { opacity: .38; }
  #highlight-label { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: .05em; white-space: nowrap; }
  #highlight { display: flex; gap: 2px; flex-wrap: wrap; }
  #highlight button {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 3px 9px; border-radius: 4px; cursor: pointer; font: inherit; font-size: 13px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  #highlight button:hover { border-color: var(--muted); }
  #highlight button.active { color: #fff; border-color: currentColor; }
  #content { flex: 1; overflow: auto; padding: 0; background: var(--bg); }
  #content .placeholder { color: var(--muted); padding: 24px; }
  #filehead {
    position: sticky; top: 0; background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 8px 16px; color: var(--muted); font-size: 12px; display: none;
  }
  pre { margin: 0; padding: 16px; white-space: pre-wrap; word-break: break-word; }
  .jsonl-rec { border-bottom: 1px solid var(--border); padding: 10px 16px; }
  .jsonl-rec pre { padding: 0; }
  .err { color: #f48771; padding: 16px; }
  #filehead { display: none; align-items: center; gap: 12px; }
  #filehead .spacer { flex: 1; }
  .open-btn {
    background: var(--dir); color: #fff; border: 0; padding: 4px 12px;
    border-radius: 4px; cursor: pointer; font: inherit; font-size: 12px; white-space: nowrap;
  }
  .open-btn:hover { filter: brightness(1.1); }
  /* rendered markdown */
  .md { padding: 20px 28px; max-width: 900px; line-height: 1.6; }
  .md h1, .md h2, .md h3, .md h4 { color: #fff; line-height: 1.3; margin: 1.2em 0 .5em; }
  .md h1 { font-size: 1.7em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
  .md h2 { font-size: 1.4em; border-bottom: 1px solid var(--border); padding-bottom: .2em; }
  .md h3 { font-size: 1.2em; } .md h4 { font-size: 1.05em; }
  .md p { margin: .6em 0; }
  .md a { color: var(--dir); }
  .md code { background: #2d2d2d; padding: 1px 5px; border-radius: 3px; font-size: .9em; color: #ce9178; }
  .md pre.code { background: #1a1a1a; border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; overflow-x: auto; margin: .8em 0; }
  .md pre.code code { background: none; padding: 0; color: var(--fg); }
  .md blockquote { border-left: 3px solid var(--dir); margin: .8em 0; padding: .2em 14px; color: var(--muted); }
  .md ul, .md ol { margin: .6em 0; padding-left: 1.6em; }
  .md li { margin: .25em 0; }
  .md hr { border: 0; border-top: 1px solid var(--border); margin: 1.4em 0; }
  .md table { border-collapse: collapse; margin: .8em 0; }
  .md th, .md td { border: 1px solid var(--border); padding: 5px 10px; }
  .md th { background: var(--panel); }
  .md img { max-width: 100%; }
  /* syntax highlight tokens */
  .tok-key { color: #9cdcfe; }
  .tok-string { color: #ce9178; }
  .tok-num { color: #b5cea8; }
  .tok-bool { color: #569cd6; }
  .tok-null { color: #569cd6; }
  .tok-kw { color: #c586c0; }
  .tok-comment { color: #6a9955; font-style: italic; }
  .tok-punct { color: #808080; }
</style>
</head>
<body>
<header>
  <h1>◆ Claude Explorer</h1>
  <div id="breadcrumb"></div>
  <span id="highlight-label">Highlight</span>
  <div id="highlight" title="Highlight a category"></div>
</header>
<main>
  <div id="list"></div>
  <div id="divider"></div>
  <div id="content">
    <div id="filehead"></div>
    <div id="filebody"><div class="placeholder">Select a file to view its contents.</div></div>
  </div>
</main>
<script>
let ROOT = "";
let curDir = "";

async function api(route, path) {
  const r = await fetch(route + "?path=" + encodeURIComponent(path || ""));
  return r.json();
}

function fmtSize(n) {
  if (n < 1024) return n + " B";
  if (n < 1024*1024) return (n/1024).toFixed(1) + " KB";
  return (n/1024/1024).toFixed(1) + " MB";
}
function fmtDate(ts) {
  if (!ts) return "";
  return new Date(ts*1000).toLocaleString();
}

// category metadata for the highlight selector
const CATEGORIES = [
  { key: "memory",   label: "Memory",   icon: "🧠", color: "#dcdcaa" },
  { key: "skills",   label: "Skills",   icon: "🛠️", color: "#4ec9b0" },
  { key: "agents",   label: "Agents",   icon: "🤖", color: "#569cd6" },
  { key: "commands", label: "Commands", icon: "⌘",  color: "#c586c0" },
  { key: "plugins",  label: "Plugins",  icon: "🔌", color: "#ce9178" },
  { key: "sessions", label: "Sessions", icon: "💬", color: "#9cdcfe" },
  { key: "config",   label: "Config",   icon: "⚙️", color: "#d7ba7d" },
];
const CAT_BY_KEY = Object.fromEntries(CATEGORIES.map(c => [c.key, c]));
let highlightCat = localStorage.getItem("cx-highlight") || "";

function renderHighlightBar() {
  const bar = document.getElementById("highlight");
  bar.innerHTML = "";
  const mk = (key, label, icon, color) => {
    const b = document.createElement("button");
    b.innerHTML = (icon ? '<span>' + icon + '</span>' : "") + '<span>' + label + '</span>';
    if (highlightCat === key) { b.classList.add("active"); if (color) b.style.color = color; }
    b.onclick = () => {
      highlightCat = (highlightCat === key) ? "" : key;
      localStorage.setItem("cx-highlight", highlightCat);
      renderHighlightBar();
      loadDir(curDir);
    };
    bar.appendChild(b);
  };
  mk("", "None", "", "");
  CATEGORIES.forEach(c => mk(c.key, c.label, c.icon, c.color));
}

function renderBreadcrumb() {
  const bc = document.getElementById("breadcrumb");
  bc.innerHTML = "";
  const parts = curDir ? curDir.split("/") : [];
  const rootLink = document.createElement("a");
  rootLink.textContent = "~/.claude";
  rootLink.onclick = () => loadDir("");
  bc.appendChild(rootLink);
  let acc = "";
  parts.forEach(p => {
    acc = acc ? acc + "/" + p : p;
    const sep = document.createElement("span");
    sep.className = "sep"; sep.textContent = "/";
    bc.appendChild(sep);
    const a = document.createElement("a");
    a.textContent = p;
    const target = acc;
    a.onclick = () => loadDir(target);
    bc.appendChild(a);
  });
}

async function loadDir(path) {
  curDir = path;
  renderBreadcrumb();
  const list = document.getElementById("list");
  const data = await api("/api/list", path);
  list.innerHTML = "";
  if (data.error) { list.innerHTML = '<div class="err">' + data.error + '</div>'; return; }

  if (path) {
    const up = document.createElement("div");
    up.className = "row dir";
    up.innerHTML = '<span class="icon">↑</span><span class="name">..</span>';
    up.onclick = () => {
      const parts = path.split("/"); parts.pop();
      loadDir(parts.join("/"));
    };
    list.appendChild(up);
  }

  data.entries.forEach(e => {
    const row = document.createElement("div");
    row.className = "row " + e.type;
    const childPath = path ? path + "/" + e.name : e.name;
    const cats = e.cats || [];
    let badge = "";
    if (highlightCat && cats.includes(highlightCat)) {
      const c = CAT_BY_KEY[highlightCat];
      row.classList.add("hl");
      row.style.setProperty("--hl", c.color);
      const tip = e.type === "dir" ? "contains " + c.label.toLowerCase() : c.label;
      badge = '<span class="cat-badge" title="' + tip + '">' + c.icon + '</span>';
    } else if (highlightCat) {
      row.classList.add("dim");
    }
    const icon = e.type === "dir" ? "▸" : "·";
    row.innerHTML = '<span class="icon">' + icon + '</span>' +
      '<span class="name">' + e.name + badge + '</span>' +
      '<span class="meta">' + (e.type === "dir" ? "" : fmtSize(e.size)) + '</span>';
    row.onclick = () => {
      if (e.type === "dir") { loadDir(childPath); }
      else {
        document.querySelectorAll(".row.sel").forEach(r => r.classList.remove("sel"));
        row.classList.add("sel");
        loadFile(childPath, e);
      }
    };
    list.appendChild(row);
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
          .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

// Block dangerous URL schemes in generated href/src (defense-in-depth).
// Operates on already-escaped text, so compare against the escaped form too.
function safeUrl(u) {
  const t = u.trim().replace(/&#39;|&quot;/g, "").toLowerCase();
  if (/^(javascript|data|vbscript):/i.test(t)) return "#";
  return u;
}

async function loadFile(path, entry) {
  const head = document.getElementById("filehead");
  const body = document.getElementById("filebody");
  head.style.display = "flex";
  const info = path + "  ·  " + fmtSize(entry.size) + "  ·  " + fmtDate(entry.mtime);
  body.innerHTML = '<div class="placeholder">Loading…</div>';
  const data = await api("/api/file", path);
  head.innerHTML = '<span>' + escapeHtml(info) + '</span><span class="spacer"></span>';
  const openBtn = document.createElement("button");
  openBtn.className = "open-btn";
  openBtn.textContent = "Open in VS Code";
  openBtn.onclick = async () => {
    openBtn.textContent = "Opening…";
    const r = await api("/api/open", path);
    openBtn.textContent = r && r.ok ? "Opened ✓" : "Failed";
    setTimeout(() => { openBtn.textContent = "Open in VS Code"; }, 1500);
  };
  head.appendChild(openBtn);
  if (data.error) { body.innerHTML = '<div class="err">' + data.error + '</div>'; return; }
  if (data.binary || data.truncated) {
    body.innerHTML = '<div class="placeholder">' + escapeHtml(data.content) + '</div>';
    return;
  }
  const lower = path.toLowerCase();
  if (lower.endsWith(".jsonl")) return renderJsonl(body, data.content);
  if (lower.endsWith(".json")) return renderJson(body, data.content);
  if (lower.endsWith(".md") || lower.endsWith(".markdown")) {
    body.innerHTML = '<div class="md">' + renderMarkdown(data.content) + '</div>';
    return;
  }
  body.innerHTML = "<pre>" + escapeHtml(data.content) + "</pre>";
}

// --- compact, dependency-free markdown renderer ---
function mdInline(s) {
  s = escapeHtml(s);
  // inline code first, protect from other rules
  const codes = [];
  s = s.replace(/`([^`]+)`/g, (m, c) => { codes.push(c); return "␀" + (codes.length-1) + "␀"; });
  s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)[^)]*\)/g, (m, alt, src) =>
    '<img alt="' + alt + '" src="' + safeUrl(src) + '">');
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)[^)]*\)/g, (m, text, href) =>
    '<a href="' + safeUrl(href) + '" target="_blank" rel="noopener">' + text + '</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/__([^_]+)__/g, "<strong>$1</strong>");
  s = s.replace(/\*([^*]+)\*/g, "<em>$1</em>");
  s = s.replace(/(^|[^_])_([^_]+)_/g, "$1<em>$2</em>");
  s = s.replace(/~~([^~]+)~~/g, "<del>$1</del>");
  s = s.replace(/␀(\d+)␀/g, (m, i) => "<code>" + escapeHtml(codes[+i]) + "</code>");
  return s;
}

// --- syntax highlighting (dependency-free) ---
function highlightJson(text) {
  const re = /("(?:[^"\\]|\\.)*")(\s*:)?|\b(true|false)\b|\b(null)\b|(-?\d+\.?\d*(?:[eE][+-]?\d+)?)|([{}\[\],])/g;
  let out = "", last = 0, m;
  while ((m = re.exec(text))) {
    out += escapeHtml(text.slice(last, m.index));
    if (m[1] !== undefined) {
      const cls = m[2] ? "tok-key" : "tok-string";
      out += '<span class="' + cls + '">' + escapeHtml(m[1]) + '</span>' + (m[2] || "");
    } else if (m[3] !== undefined) out += '<span class="tok-bool">' + m[3] + '</span>';
    else if (m[4] !== undefined) out += '<span class="tok-null">' + m[4] + '</span>';
    else if (m[5] !== undefined) out += '<span class="tok-num">' + m[5] + '</span>';
    else if (m[6] !== undefined) out += '<span class="tok-punct">' + m[6] + '</span>';
    last = re.lastIndex;
  }
  out += escapeHtml(text.slice(last));
  return out;
}

const KEYWORDS = {
  js: "abstract async await break case catch class const continue debugger default delete do else export extends finally for from function get if import in instanceof let new of return set static super switch this throw try typeof var void while yield true false null undefined",
  py: "and as assert async await break class continue def del elif else except finally for from global if import in is lambda nonlocal not or pass raise return try while with yield True False None self",
  bash: "if then else elif fi for while do done case esac function in return export local echo cd set source then time until",
  css: "important",
  html: "",
};
KEYWORDS.ts = KEYWORDS.js + " interface type enum implements readonly namespace declare public private protected as satisfies";
KEYWORDS.jsx = KEYWORDS.js; KEYWORDS.tsx = KEYWORDS.ts;
KEYWORDS.javascript = KEYWORDS.js; KEYWORDS.typescript = KEYWORDS.ts;
KEYWORDS.python = KEYWORDS.py; KEYWORDS.sh = KEYWORDS.bash; KEYWORDS.shell = KEYWORDS.bash;
KEYWORDS.zsh = KEYWORDS.bash;
const HASH_LANGS = new Set(["py","python","bash","sh","shell","zsh","yaml","yml","ruby","rb","toml","ini","r"]);

function highlightCode(code, lang) {
  lang = (lang || "").trim().toLowerCase();
  const l = (lang.match(/^[a-z0-9+#]+/) || [""])[0];
  if (l === "json" || l === "jsonc" || l === "json5") return highlightJson(code);
  const kwList = (KEYWORDS[l] || "").split(/\s+/).filter(Boolean);
  const kw = new Set(kwList);
  const hasKw = kwList.length > 0;
  const hash = HASH_LANGS.has(l);
  const lineComment = hash ? "#[^\\n]*" : "\\/\\/[^\\n]*";
  const re = new RegExp(
    "(" + lineComment + "|\\/\\*[\\s\\S]*?\\*\\/)" +
    "|(\"(?:[^\"\\\\]|\\\\.)*\"|'(?:[^'\\\\]|\\\\.)*'|`(?:[^`\\\\]|\\\\.)*`)" +
    "|\\b(0x[0-9a-fA-F]+|\\d+\\.?\\d*(?:[eE][+-]?\\d+)?)\\b" +
    "|([A-Za-z_$][\\w$]*)", "g");
  let out = "", last = 0, m;
  while ((m = re.exec(code))) {
    out += escapeHtml(code.slice(last, m.index));
    if (m[1] !== undefined) out += '<span class="tok-comment">' + escapeHtml(m[1]) + '</span>';
    else if (m[2] !== undefined) out += '<span class="tok-string">' + escapeHtml(m[2]) + '</span>';
    else if (m[3] !== undefined) out += '<span class="tok-num">' + escapeHtml(m[3]) + '</span>';
    else if (m[4] !== undefined) {
      if (hasKw && kw.has(m[4])) out += '<span class="tok-kw">' + m[4] + '</span>';
      else out += escapeHtml(m[4]);
    }
    last = re.lastIndex;
  }
  out += escapeHtml(code.slice(last));
  return out;
}

function renderMarkdown(text) {
  const lines = text.replace(/\r\n/g, "\n").split("\n");
  let html = "", i = 0;
  const listStack = [];  // {type}
  function closeLists(toDepth) {
    while (listStack.length > toDepth) html += "</" + listStack.pop().type + ">";
  }
  while (i < lines.length) {
    let line = lines[i];

    // fenced code block
    const fence = line.match(/^```(.*)$/);
    if (fence) {
      closeLists(0);
      const buf = [];
      i++;
      while (i < lines.length && !/^```/.test(lines[i])) { buf.push(lines[i]); i++; }
      i++; // skip closing fence
      const lang = (fence[1] || "").trim();
      html += '<pre class="code"><code>' + highlightCode(buf.join("\n"), lang) + "</code></pre>";
      continue;
    }

    // horizontal rule
    if (/^\s*(---|\*\*\*|___)\s*$/.test(line)) { closeLists(0); html += "<hr>"; i++; continue; }

    // heading
    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h) { closeLists(0); const n = h[1].length; html += "<h"+n+">"+mdInline(h[2])+"</h"+n+">"; i++; continue; }

    // blockquote (collect consecutive)
    if (/^\s*>/.test(line)) {
      closeLists(0);
      const buf = [];
      while (i < lines.length && /^\s*>/.test(lines[i])) { buf.push(lines[i].replace(/^\s*>\s?/, "")); i++; }
      html += "<blockquote>" + renderMarkdown(buf.join("\n")) + "</blockquote>";
      continue;
    }

    // table (header row + separator)
    if (/\|/.test(line) && i+1 < lines.length && /^\s*\|?[\s:|-]+\|[\s:|-]+$/.test(lines[i+1])) {
      closeLists(0);
      const parseRow = r => r.replace(/^\s*\|/, "").replace(/\|\s*$/, "").split("|").map(c => c.trim());
      const headCells = parseRow(line);
      i += 2;
      let t = "<table><thead><tr>" + headCells.map(c => "<th>"+mdInline(c)+"</th>").join("") + "</tr></thead><tbody>";
      while (i < lines.length && /\|/.test(lines[i]) && lines[i].trim()) {
        t += "<tr>" + parseRow(lines[i]).map(c => "<td>"+mdInline(c)+"</td>").join("") + "</tr>";
        i++;
      }
      html += t + "</tbody></table>";
      continue;
    }

    // list item (unordered or ordered), depth by indentation
    const li = line.match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/);
    if (li) {
      const depth = Math.floor(li[1].length / 2) + 1;
      const ordered = /\d+\./.test(li[2]);
      const type = ordered ? "ol" : "ul";
      if (listStack.length < depth) {
        while (listStack.length < depth) { html += "<"+type+">"; listStack.push({type}); }
      } else {
        closeLists(depth);
        if (listStack.length && listStack[listStack.length-1].type !== type) {
          html += "</"+listStack.pop().type+"><"+type+">"; listStack.push({type});
        }
      }
      html += "<li>" + mdInline(li[3]) + "</li>";
      i++; continue;
    }

    // blank line
    if (!line.trim()) { closeLists(0); i++; continue; }

    // paragraph (collect consecutive non-blank, non-special lines)
    closeLists(0);
    const para = [line]; i++;
    while (i < lines.length && lines[i].trim() &&
           !/^```/.test(lines[i]) && !/^(#{1,6})\s/.test(lines[i]) &&
           !/^\s*>/.test(lines[i]) && !/^\s*([-*+]|\d+\.)\s/.test(lines[i]) &&
           !/^\s*(---|\*\*\*|___)\s*$/.test(lines[i])) {
      para.push(lines[i]); i++;
    }
    html += "<p>" + mdInline(para.join("\n")).replace(/\n/g, "<br>") + "</p>";
  }
  closeLists(0);
  return html;
}

function renderJson(body, text) {
  try {
    const obj = JSON.parse(text);
    body.innerHTML = "<pre>" + highlightJson(JSON.stringify(obj, null, 2)) + "</pre>";
  } catch (e) {
    body.innerHTML = "<pre>" + escapeHtml(text) + "</pre>";
  }
}

function renderJsonl(body, text) {
  body.innerHTML = "";
  const lines = text.split("\n").filter(l => l.trim());
  lines.forEach((line, i) => {
    const div = document.createElement("div");
    div.className = "jsonl-rec";
    let pretty, ok = true;
    try { pretty = JSON.stringify(JSON.parse(line), null, 2); }
    catch (e) { pretty = line; ok = false; }
    div.innerHTML = "<pre>" + (ok ? highlightJson(pretty) : escapeHtml(pretty)) + "</pre>";
    body.appendChild(div);
  });
  if (!lines.length) body.innerHTML = '<div class="placeholder">empty</div>';
}

// resizable left panel
(function initResize() {
  const list = document.getElementById("list");
  const divider = document.getElementById("divider");
  const saved = parseInt(localStorage.getItem("cx-list-width") || "", 10);
  if (saved >= 150) list.style.width = saved + "px";
  let dragging = false;
  divider.addEventListener("mousedown", e => {
    dragging = true; divider.classList.add("dragging");
    document.body.style.userSelect = "none"; e.preventDefault();
  });
  window.addEventListener("mousemove", e => {
    if (!dragging) return;
    const w = Math.max(150, Math.min(e.clientX, window.innerWidth - 200));
    list.style.width = w + "px";
  });
  window.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false; divider.classList.remove("dragging");
    document.body.style.userSelect = "";
    localStorage.setItem("cx-list-width", parseInt(list.style.width, 10));
  });
})();

(async function init() {
  const r = await api("/api/root", "");
  ROOT = r.root;
  renderHighlightBar();
  loadDir("");
})();
</script>
